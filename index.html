<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>myKiosk-One</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="/src/style.css">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: opacity 0.3s;
            perspective: 1000px;
        }
        .edit-mode #canvas {
            opacity: 0.6;
        }
        .widget {
            position: absolute;
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            /* Wrapper only handles movement and size */
            transition: width 0.1s ease-out, height 0.1s ease-out, box-shadow 0.2s;
        }
        .widget.cube-widget {
            overflow: visible;
            background: transparent;
            backdrop-filter: none;
            border: none;
            box-shadow: none;
        }
        
        /* Fixed Header Styles */
        .widget-header {
            width: 100%;
            height: 44px;
            padding: 0 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            box-sizing: border-box;
            flex-shrink: 0;
            z-index: 10;
        }
        .widget-icon { font-size: 18px; }
        .widget-title { 
            font-size: 12px; 
            font-weight: 600; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            opacity: 0.8;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .widget-content-host {
            flex-grow: 1;
            width: 100%;
            height: calc(100% - 44px);
            position: relative;
            overflow: hidden;
        }
        
        .widget.moving { transition: none; }
        .widget.focused {
            box-shadow: 0 0 0 3px rgba(0, 255, 255, 0.4), 0 20px 50px rgba(0,0,0,0.6);
            z-index: 500 !important;
        }
        .widget.selected {
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.5);
        }
        .widget.locked {
            opacity: 0.8;
            cursor: default !important;
        }
        .edit-mode .widget {
            cursor: move;
            border: 2px solid rgba(0, 255, 255, 0.2);
        }
        .widget:active {
            opacity: 0.9;
        }
        
        .resize-handle {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 30px;
            height: 30px;
            cursor: nwse-resize;
            background: linear-gradient(135deg, transparent 50%, rgba(255,255,255,0.3) 50%);
            display: none;
            z-index: 100;
        }
        .edit-mode .resize-handle {
            display: block;
        }

        .widget-content {
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .widget.focused .widget-content {
            pointer-events: auto;
        }
        .edit-mode .widget-content {
            pointer-events: none !important;
        }
        
        /* GUI Overlays */
        #selection-box {
            position: absolute;
            border: 1px solid rgba(0, 255, 255, 0.5);
            background: rgba(0, 255, 255, 0.1);
            pointer-events: none;
            display: none;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 1000;
        }
        .ui-btn {
            pointer-events: auto;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 10px 18px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .ui-btn.active {
            background: rgba(0, 255, 255, 0.3);
            border-color: rgba(0, 255, 255, 0.5);
        }
        .ui-btn:hover {
            background: rgba(255,255,255,0.1);
        }
        .bottom-bar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
        }
        /* Lock indicator */
        .lock-icon {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 14px;
            display: none;
            opacity: 0.6;
        }
        .widget.locked .lock-icon {
            display: block;
        }
        #modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            pointer-events: auto;
        }
        .modal {
            background: #111;
            width: 90%;
            max-width: 500px;
            padding: 30px;
            border-radius: 32px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .modal h2 { margin-top: 0; font-weight: 300; }
        .modal input, .modal select {
            width: 100%;
            background: #222;
            border: 1px solid #333;
            color: #fff;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
        }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .delete-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 0, 0, 0.6);
            border: none;
            color: #fff;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: none;
            z-index: 110;
        }
        .edit-mode .delete-btn { display: block; }
        .night-mode * { animation-play-state: paused !important; }
        .night-btn { background: #222; border: 1px solid #444; color: #fff; font-size: 8px; padding: 2px 5px; cursor: pointer; border-radius: 3px; }
        .night-btn.active { background: #0f0; color: #000; border-color: #0f0; }

        /* 3D Cube Styles */
        .cube-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: auto;
        }
        .cube-face {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            color: #fff;
            text-align: center;
            padding: 0;
            box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            overflow: hidden;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(15px);
        }
        
        .cube-face.front  { transform: translateZ(var(--half)); }
        .cube-face.back   { transform: rotateY(180deg) translateZ(var(--half)); }
        .cube-face.right  { transform: rotateY(90deg) translateZ(var(--half)); }
        .cube-face.left   { transform: rotateY(-90deg) translateZ(var(--half)); }
        .cube-face.top    { transform: rotateX(90deg) translateZ(var(--half)); }
        .cube-face.bottom { transform: rotateX(-90deg) translateZ(var(--half)); }

        /* Face background hints for debug/structure */
        .cube-face.front  { border-color: #ff4d4d; }
        .cube-face.back   { border-color: #4d4dff; }
        .cube-face.right  { border-color: #4dff4d; }
        .cube-face.left   { border-color: #ffff4d; }
        .cube-face.top    { border-color: #888888; }
        .cube-face.bottom { border-color: #111111; }
        
        /* Edit Mode Overrides */
        .edit-mode .cube-container {
            pointer-events: none !important; /* Block rotation in edit mode */
        }
    </style>
</head>
<body>
    <div id="canvas"></div>
    <div id="selection-box"></div>
    <div id="perf-monitor" style="position:fixed; top:10px; left:10px; background:rgba(0,0,0,0.7); backdrop-filter:blur(5px); padding:10px; border-radius:10px; font-size:10px; font-family:monospace; color:#0f0; pointer-events:none; z-index:5000; border:1px solid rgba(0,255,0,0.2); display:none">
        FPS: <span id="perf-fps">0</span><br>
        RAM: <span id="perf-ram">LOW</span><br>
        WIDGETS: <span id="perf-widgets">0</span><br>
        PAUSED: <span id="perf-paused">0</span><br>
        RELOADS: <span id="perf-reloads">0</span><br>
        UNLOADING: <span id="perf-unloading">0</span><br>
        STORAGE: <span id="perf-storage">0MB</span> / 500MB<br>
        MODE: <span id="perf-status">NORMAL</span> (<span id="perf-timer">0</span>s)<br>
        NIGHT: <span id="perf-night">OFF</span>
        <div id="night-controls" style="margin-top:5px; pointer-events:auto; display:flex; gap:5px">
            <button id="night-auto" class="night-btn active">AUTO</button>
            <button id="night-on" class="night-btn">SLEEP</button>
            <button id="night-off" class="night-btn">ON</button>
        </div>
    </div>
    <div id="night-overlay" style="position:fixed; inset:0; background:#000; opacity:0; pointer-events:none; z-index:9000; transition:opacity 1s ease"></div>
    <div id="ui-layer">
        <div class="bottom-bar">
            <button id="add-widget-btn" class="ui-btn">Add Widget</button>
            <button id="edit-mode-btn" class="ui-btn">Edit Mode</button>
            <button id="snap-btn" class="ui-btn">Snap Grid</button>
            <button id="lock-btn" class="ui-btn">Lock</button>
            <button id="wp-btn" class="ui-btn">Wallpaper</button>
        </div>
    </div>

    <div id="modal-overlay">
        <div class="modal" id="widget-modal">
            <h2>Add Widget</h2>
            <select id="widget-type">
                <option value="url">Link (PWA Mode)</option>
                <option value="slideshow">Slideshow (Internal)</option>
                <option value="youtube">YouTube (Embedded)</option>
                <option value="spotify">Spotify (Embedded)</option>
                <option value="amazonmusic">Amazon Music (Embedded)</option>
                <option value="calendar">Calendar (Embedded)</option>
                <option value="tasks">Tasks / Todo (Internal)</option>
                <option value="weather">Weather (Internal)</option>
                <option value="clock">Clock (Internal)</option>
                <option value="cube">3D Cube (Test)</option>
            </select>
            <div id="slideshow-options" style="display:none">
                <select id="slideshow-transition">
                    <option value="fade">Fade</option>
                    <option value="slide">Slide</option>
                    <option value="zoom">Zoom</option>
                    <option value="blur">Blur</option>
                    <option value="rotate">Rotate</option>
                </select>
                <input type="number" id="slideshow-speed" placeholder="Speed (ms)" value="5000">
            </div>
            <div id="url-fields">
                <input type="text" id="widget-name" placeholder="Name (e.g. Spotify)">
                <input type="text" id="widget-url" placeholder="URL (https://...)">
            </div>
            <div id="slideshow-fields" style="display:none">
                <p style="font-size:12px; opacity:0.6">Select a folder of images. They will be stored locally.</p>
                <input type="file" id="slideshow-input" webkitdirectory directory multiple>
            </div>
            <div class="grid-2">
                <button id="cancel-widget" class="ui-btn">Cancel</button>
                <button id="confirm-widget" class="ui-btn" style="background:rgba(255,255,255,0.2)">Success</button>
            </div>
        </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js');
            });
        }
    </script>
</body>
</html>
